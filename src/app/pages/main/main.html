<div class="page">
  <div class="container">
    <div class="header">
        <h1>Добро пожаловать</h1>
        <div class="actions">
            @if (isLogin()) {
                @if (isAdmin()) {
                    <button class="admins" (click)="doctors()">Доктора</button>
                    <button class="users" (click)="patients()">Пациенты</button>
                    <button class="add" (click)="specialties()">Специальности</button>
                }
                @if (isDoctor()) {
                    <button class="add" (click)="mySlots()">Мои слоты</button>
                    <button class="users" (click)="patients()">Пациенты</button>
                    <button class="admins" (click)="profileDoctor()">Профиль</button>
                }
                @if (isPatient()) {
                    <button class="add" (click)="specialties()">Записаться к врачу</button>
                    <button class="users" (click)="myBookings()">Мои записи</button>
                    <button class="admins" (click)="profilePatient()">Профиль</button>
                    <button class="users" (click)="replenish()">Пополнить</button>
                }
                <button class="logout" (click)="logout()">Выйти</button>
            }
            @else {
                <button class="add" (click)="login()">Войти</button>
                <button class="users" (click)="register()">Зарегистрироваться</button>
            }
        </div>
    </div>

    <p class="subtitle">Запишитесь к врачу быстро и удобно</p>
  </div>
</div>
