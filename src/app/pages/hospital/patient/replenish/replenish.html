<div class="page">
  <div class="container">
    <div class="header">
      <h1>Пополнение</h1>

      <div class="actions">
        <button class="back" (click)="back()">Назад</button>
        <button class="logout" (click)="logout()">Выйти</button>
      </div>
    </div>

    @if (isLoading()) {
      <p class="info">Загрузка...</p>
    }

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    @if (!isLoading()){
        <div class="profile-card">
            <div class="profile-info">
                <div class="meta">
                <span>Баланс:</span>
                <strong>{{ balance() }} €</strong>
                </div>
            </div>

            <form class="edit-form" [formGroup]="form" (ngSubmit)="submit()">
                <div class="form-row">
                <label for="amount">Сумма пополнения</label>
                <input
                    id="amount"
                    type="number"
                    formControlName="amount"
                    placeholder="Введите сумму"
                />

                @if (amount.touched && amount.invalid) {
                    <small class="error">
                    @if (amount.errors?.['required']) { Сумма обязательна }
                    @if (amount.errors?.['min']) { Минимум 1 € }
                    </small>
                }
                </div>

                <div class="form-actions">
                <button type="submit" class="save" [disabled]="isSaving()">
                    {{ isSaving() ? 'Пополнение...' : 'Пополнить' }}
                </button>
                </div>
            </form>
        </div>
    }
  </div>
</div>
