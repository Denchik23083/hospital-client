<div class="page">
  <div class="container">
    <div class="header">
        <h1>Выберите направление</h1>
        <div class="actions">
          <button class="back" (click)="back()">Назад</button>
          <button class="logout" (click)="logout()">Выйти</button>
        </div>
    </div>

    @if (isLoading()) {
      <p class="info">Загрузка...</p>
    }

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <div class="grid">
      @for (specialty of specialties(); track specialty.id) {
        <div class="card" (click)="details(specialty.id)">
          <h3>{{ specialty.name }}</h3>
          <p class="author">{{ specialty.price }}$</p>
        </div>
      }
    </div>
  </div>
</div>
