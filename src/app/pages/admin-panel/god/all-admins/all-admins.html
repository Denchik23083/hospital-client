<div class="page">
  <div class="container">
    <div class="header">
        <h1>Список администраторов</h1>
        <div class="actions">
          <button class="back" (click)="back()">Назад</button>
          <button class="logout" (click)="logout()">Выйти</button>
        </div>
    </div>

    @if (isLoading()) {
      <p class="info">Загрузка...</p>
    }

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <div class="grid">
      @for (admin of users(); track admin.id) {
        <div class="card" (click)="details(admin.id)">
          <h3>{{ admin.userName }}</h3>
          <p class="author">{{ admin.email }}</p>
        </div>
      }
    </div>
  </div>
</div>
