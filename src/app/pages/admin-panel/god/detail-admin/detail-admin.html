<div class="page">
  <div class="container">
    <div class="header">
        <h1>Администратор</h1>
        <div class="actions">
            <button class="back" (click)="back()">Назад</button>
            <button class="logout" (click)="logout()">Выйти</button>
        </div>
    </div>

    @if (isLoading()) {
      <p class="info">Загрузка...</p>
    }

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    @if (!isLoading() && !errorMessage() && admin()) {
      <div class="card">
        <h2>{{ admin()!.userName }}</h2>
        <p class="author">{{ admin()!.email }}</p>

          <div class="card-actions">
            <button class="edit" (click)="makeUser()">Понизить</button>
          </div>
      </div>
    }
  </div>
</div>
