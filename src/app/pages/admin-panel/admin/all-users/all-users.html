<div class="page">
  <div class="container">
    <div class="header">
        <h1>Список пациентов</h1>
        <div class="actions">
          <button class="back" (click)="back()">Назад</button>
          <button class="logout" (click)="logout()">Выйти</button>
        </div>
    </div>

    @if (isLoading()) {
      <p class="info">Загрузка...</p>
    }

    @if (errorMessage()) {
      <p class="error">{{ errorMessage() }}</p>
    }

    <div class="grid">
      @for (user of users(); track user.id) {
        <div class="card" (click)="details(user.id)">
          <h3>{{ user.userName }}</h3>
          <p class="author">{{ user.email }}</p>
        </div>
      }
    </div>
  </div>
</div>
